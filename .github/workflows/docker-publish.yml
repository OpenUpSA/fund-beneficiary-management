name: Build and publish image

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # "soar" flavour -> deploys to scat-soar-image (scat-crm / LDA branding).
          # Branding comes from the existing repo Variables, so current behaviour is unchanged.
          - flavor: soar
            app: scat-soar-image
            branding_args: |
              NEXT_PUBLIC_LDA_SHORT_NAME=${{ vars.NEXT_PUBLIC_LDA_SHORT_NAME }}
              NEXT_PUBLIC_LDA_SHORT_NAME_PLURAL=${{ vars.NEXT_PUBLIC_LDA_SHORT_NAME_PLURAL }}
              NEXT_PUBLIC_LDA_FULL_NAME=${{ vars.NEXT_PUBLIC_LDA_FULL_NAME }}
              NEXT_PUBLIC_LDA_FULL_NAME_PLURAL=${{ vars.NEXT_PUBLIC_LDA_FULL_NAME_PLURAL }}
              NEXT_PUBLIC_LDA_URL_PATH=${{ vars.NEXT_PUBLIC_LDA_URL_PATH }}
              NEXT_PUBLIC_LOGO_PATH=${{ vars.NEXT_PUBLIC_LOGO_PATH }}
              NEXT_PUBLIC_FAVICON_PATH=${{ vars.NEXT_PUBLIC_FAVICON_PATH }}
              NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}

          # "ddi-gms" flavour -> deploys to ddi-gms-image (scat-data / Beneficiary branding).
          # NEXT_PUBLIC_* are baked into the client bundle at build time, so they are
          # literals here rather than runtime config (runtime NEXT_PUBLIC_* would not
          # change the compiled browser code).
          - flavor: ddi-gms
            app: ddi-gms-image
            branding_args: |
              NEXT_PUBLIC_LDA_SHORT_NAME=Beneficiary
              NEXT_PUBLIC_LDA_SHORT_NAME_PLURAL=Beneficiaries
              NEXT_PUBLIC_LDA_FULL_NAME=Beneficiary
              NEXT_PUBLIC_LDA_FULL_NAME_PLURAL=Beneficiaries
              NEXT_PUBLIC_LDA_URL_PATH=beneficiaries
              NEXT_PUBLIC_LOGO_PATH=/images/gmslogo.png
              NEXT_PUBLIC_FAVICON_PATH=/images/favicon/favicon.ico
              NEXT_PUBLIC_API_BASE_URL=https://ddi-gms.openup.org.za

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # -> ghcr.io/openupsa/fund-beneficiary-management
          # Per-flavour tag suffix so the two images never collide:
          #   sha-<short>-soar / sha-<short>-ddi-gms, latest-soar / latest-ddi-gms
          flavor: |
            suffix=-${{ matrix.flavor }},onlatest=true
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Next.js bakes NEXT_PUBLIC_* at BUILD time. Branding args differ per flavour
          # (matrix.branding_args); the rest are shared. SENTRY_AUTH_TOKEN is a secret and
          # cannot live in the matrix, so it is passed here.
          build-args: |
            ${{ matrix.branding_args }}
            NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT=${{ vars.NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT }}
            NEXT_PUBLIC_ENVIRONMENT=${{ vars.NEXT_PUBLIC_ENVIRONMENT }}
            NEXT_PUBLIC_ENABLE_COUNTRY_REGION=${{ vars.NEXT_PUBLIC_ENABLE_COUNTRY_REGION }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Configure SSH deploy key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H dokku10.openup.org.za >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy image to Dokku
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO}:sha-$(echo "${{ github.sha }}" | cut -c1-7)-${{ matrix.flavor }}"
          echo "Deploying $IMAGE to Dokku app ${{ matrix.app }}"
          ssh -o BatchMode=yes dokku@dokku10.openup.org.za \
            git:from-image ${{ matrix.app }} "$IMAGE"
